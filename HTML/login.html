<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
    <div class="wrapper">
        <form action="">
            <h1>
                Login
            </h1>
            <div class="input-box">
                <input type="text" class="username" id="user-name" placeholder="Username" required>
                <i class='bx bxs-user' id="userIcon"></i>
            </div>
            <div class="input-box">
                <input type="password" class="password" id="password" placeholder="Password" required>
                <i class='bx bxs-lock-alt' id="lockIcon"></i>
            </div>
            <nav>
                <a href="mainpage.html">
                    <button type="button" class="btn-login">
                        Login
                    </button>
                </a>
            </nav>
        </form>
    </div>
</body>
</html>
